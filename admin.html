<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barfinder Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;padding:20px}
h1{color:#ff6b35;margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:30px}
.stat-card{background:#1a1a1a;border-radius:12px;padding:20px;text-align:center}
.stat-card .num{font-size:2em;font-weight:700;color:#ff6b35}
.stat-card .label{font-size:.85em;color:#999;margin-top:5px}
table{width:100%;border-collapse:collapse;background:#1a1a1a;border-radius:12px;overflow:hidden}
th,td{padding:12px 15px;text-align:left;border-bottom:1px solid #2a2a2a}
th{background:#222;color:#ff6b35;font-weight:600}
.role-badge{padding:3px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.role-admin{background:#ff6b35;color:#000}
.role-user{background:#333;color:#ccc}
button{background:#ff6b35;color:#000;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85em}
button:hover{background:#ff8855}
button.danger{background:#ff3b30;color:#fff}
button.danger:hover{background:#ff5555}
.login-form{max-width:400px;margin:100px auto;background:#1a1a1a;padding:30px;border-radius:16px}
.login-form input{width:100%;padding:12px;margin:8px 0;border:1px solid #333;border-radius:8px;background:#0a0a0a;color:#fff;font-size:1em}
.login-form button{width:100%;padding:14px;margin-top:12px;font-size:1em}
.error{color:#ff3b30;margin:10px 0;font-size:.9em}
.back{color:#ff6b35;text-decoration:none;display:inline-block;margin-bottom:20px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app = document.getElementById('app');
let token = localStorage.getItem('bf_token');

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(path, { ...opts, headers });
  return r.json();
}

async function checkAuth() {
  if (!token) return showLogin();
  const data = await api('/api/auth/me');
  if (!data.user || data.user.role !== 'admin') return showLogin('Zugriff nur fuer Admins');
  showDashboard(data.user);
}

function showLogin(err) {
  app.innerHTML = `
    <div class="login-form">
      <h1>🔐 Admin Login</h1>
      ${err ? '<p class="error">' + err + '</p>' : ''}
      <input type="email" id="email" placeholder="E-Mail">
      <input type="password" id="pw" placeholder="Passwort">
      <button onclick="doLogin()">Anmelden</button>
    </div>`;
}

async function doLogin() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;
  const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pw }) });
  if (data.token) {
    token = data.token;
    localStorage.setItem('bf_token', token);
    checkAuth();
  } else {
    showLogin(data.error || 'Anmeldung fehlgeschlagen');
  }
}

async function showDashboard(user) {
  const stats = await api('/api/admin/stats');
  const users = (await api('/api/admin/users')).users || [];

  app.innerHTML = `
    <a href="/" class="back">← Zurueck zu Barfinder</a>
    <h1>🛠️ Admin Panel</h1>
    <p style="margin-bottom:20px;color:#999">Angemeldet als ${user.displayName || user.email} 
      <button onclick="logout()" style="margin-left:10px;background:#333;color:#ccc">Abmelden</button></p>
    <div class="stats">
      <div class="stat-card"><div class="num">${stats.userCount}</div><div class="label">Benutzer</div></div>
      <div class="stat-card"><div class="num">${stats.ratingCount}</div><div class="label">Bewertungen</div></div>
      <div class="stat-card"><div class="num">${stats.favCount}</div><div class="label">Favoriten</div></div>
    </div>
    <h2 style="margin:20px 0 10px;color:#ff6b35">Benutzer</h2>
    <table>
      <tr><th>ID</th><th>E-Mail</th><th>Name</th><th>Rolle</th><th>Erstellt</th><th>Aktionen</th></tr>
      ${users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.email}</td>
          <td>${u.display_name || '-'}</td>
          <td><span class="role-badge role-${u.role}">${u.role}</span></td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleDateString('de') : '-'}</td>
          <td>
            ${u.role === 'user' ? `<button onclick="setRole(${u.id},'admin')">→ Admin</button>` : u.role === 'admin' ? `<button onclick="setRole(${u.id},'user')" style="background:#333;color:#ccc">→ User</button>` : ''}
            ${u.id !== user.id ? `<button class="danger" onclick="deleteUser(${u.id},'${u.email}')">Loeschen</button>` : ''}
          </td>
        </tr>`).join('')}
    </table>`;
}

async function setRole(id, role) {
  await api(`/api/admin/users/${id}/role`, { method: 'PUT', body: JSON.stringify({ role }) });
  checkAuth();
}

async function deleteUser(id, email) {
  if (!confirm(`Benutzer ${email} wirklich loeschen?`)) return;
  await api(`/api/admin/users/${id}`, { method: 'DELETE' });
  checkAuth();
}

function logout() {
  token = null;
  localStorage.removeItem('bf_token');
  fetch('/api/auth/logout', { method: 'POST' });
  showLogin();
}

checkAuth();
</script>
</body>
</html>
